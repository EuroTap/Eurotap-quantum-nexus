<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <defs>
    <linearGradient id="phoneGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>
  
  <!-- Smartphone Frame -->
  <rect x="50" y="30" width="100" height="170" rx="20" ry="20" 
        fill="none" stroke="url(#phoneGradientDark)" stroke-width="6"/>
  
  <!-- Screen -->
  <rect x="60" y="50" width="80" height="130" rx="8" ry="8" 
        fill="rgba(26,35,50,0.9)" stroke="url(#phoneGradientDark)" stroke-width="1"/>
  
  <!-- NFC Signal Waves -->
  <g transform="translate(100, 120)">
    <path d="M -15,-8 Q -15,-20 -8,-20 Q 0,-20 0,-8" 
          fill="none" stroke="url(#phoneGradientDark)" stroke-width="4" stroke-linecap="round"/>
    <path d="M -25,-8 Q -25,-30 -8,-30 Q 8,-30 8,-8" 
          fill="none" stroke="url(#phoneGradientDark)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <path d="M -35,-8 Q -35,-40 -8,-40 Q 18,-40 18,-8" 
          fill="none" stroke="url(#phoneGradientDark)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- Home Button -->
  <circle cx="100" cy="185" r="4" fill="url(#phoneGradientDark)"/>
  
  <!-- Text -->
  <text x="100" y="230" text-anchor="middle" font-family="Arial, sans-serif" 
        font-size="24" font-weight="bold" fill="url(#phoneGradientDark)">EuroTap</text>
  <text x="100" y="245" text-anchor="middle" font-family="Arial, sans-serif" 
        font-size="12" fill="url(#phoneGradientDark)">NFC Payments Made Easy</text>
</svg>
