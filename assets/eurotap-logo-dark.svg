<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="phoneGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="50%" style="stop-color:#00aaff"/>
      <stop offset="100%" style="stop-color:#0066ff"/>
    </linearGradient>
    <linearGradient id="darkBackground" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332"/>
      <stop offset="100%" style="stop-color:#0d1421"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="190" fill="url(#darkBackground)" stroke="none"/>
  
  <!-- Phone Frame -->
  <rect x="130" y="80" width="140" height="220" rx="25" ry="25" 
        fill="none" stroke="url(#phoneGradientDark)" stroke-width="8"/>
  
  <!-- Phone Screen -->
  <rect x="145" y="105" width="110" height="170" rx="15" ry="15" 
        fill="url(#darkBackground)" stroke="url(#phoneGradientDark)" stroke-width="2"/>
  
  <!-- NFC Waves -->
  <g transform="translate(200, 190)">
    <path d="M -25,-10 Q -25,-25 -10,-25 Q 5,-25 5,-10" 
          fill="none" stroke="url(#phoneGradientDark)" stroke-width="6" stroke-linecap="round"/>
    <path d="M -35,-10 Q -35,-35 -10,-35 Q 15,-35 15,-10" 
          fill="none" stroke="url(#phoneGradientDark)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <path d="M -45,-10 Q -45,-45 -10,-45 Q 25,-45 25,-10" 
          fill="none" stroke="url(#phoneGradientDark)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- Phone Bottom Button -->
  <rect x="190" y="285" width="20" height="4" rx="2" fill="url(#phoneGradientDark)"/>
  
  <!-- Quantum Glow Effect -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="url(#phoneGradientDark)" 
          stroke-width="1" opacity="0.3" stroke-dasharray="5,5"/>
</svg>
